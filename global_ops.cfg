# Edit the file by setting additional variable <USECASE> at the end:
# 
#export NETOP_ROOT_DIR="/local/netop-tools"
#export NETOP_ROOT_DIR=$(git rev-parse --show-toplevel)
if [ -z ${NETOP_ROOT_DIR} ];then
    echo "Variable NETOP_ROOT_DIR must be set in global_ops.cfg file"
    exit 1
fi

# To allow overwrite default configuration options with chaning Git configuration
if [ ! -v GLOBAL_OPS_USER ];then
  export GLOBAL_OPS_USER=${NETOP_ROOT_DIR}/global_ops_user.cfg
fi

if [ -r "${GLOBAL_OPS_USER}" ];then
  #echo "Reading user configuration file: ${GLOBAL_OPS_USER}"
  source "${GLOBAL_OPS_USER}"
else
  echo "ERROR: User configuration file: ${GLOBAL_OPS_USER} not found"
  echo "Be sure using FULL PATH for GLOBAL_OPS_USER"
  echo "Current directory: $(pwd)"
  exit 1
fi

export K8CIDR=${K8CIDR:-"192.168.0.0/16"}           # this is your k8s cluster CIDR
export K8SVER=${K8SVER:-"1.34"}                     # select the required K8S version
export K8CL=${K8CL:-"kubectl"}                      # define the k8s commandline tool
export HOST_OS=${HOST_OS:-"ubuntu"}                 # select the host OS
export NETOP_NAMESPACE=${NETOP_NAMESPACE:-"nvidia-network-operator"}    # set the nvidia network operator name space. may differ in yoyur cluster
if [ ! -v NETOP_APP_NAMESPACES ];then
  export NETOP_APP_NAMESPACES=( "default" ) # set the name spaces that your application pods will run in. may vary in your cluster
fi
#
# setting to force MACADDR sourcing from only owning interface
# set in global_ops_user.cfg if worker node arp config returning wrong MACADDR
# SYSCTL_CONFIG="net.ipv4.conf.all.rp_filter=0,net.ipv4.conf.all.arp_announce=2,net.ipv4.conf.all.arp_ignore=1"
export SYSCTL_CONFIG=${SYSCTL_CONFIG:-""}           # overide ARP config internal to test pod
export NETOP_NETWORK_RANGE=${NETOP_NETWORK_RANGE:-"192.170.0.0/16"} # define the IP pool for your secondary rdma network. different from the K8S CDIR
                                                    # because the 2ndary E/W RDMA networks are implemented as L2 they are NOT routed.
export NETOP_NETWORK_START=${NETOP_NETWORK_START:-""} # start of IP pool range, optional
export NETOP_NETWORK_END=${NETOP_NETWORK_END:-""}   # end of IP pool range, optional
export NETOP_NETWORK_ROUTE=${NETOP_NETWORK_ROUTE:-""}   # subnet route, optional
export NETOP_NETWORK_GW=${NETOP_NETWORK_GW:-""}     # define the gateway IP for your secondary rdma network for your cluster
export NETOP_NETWORK_EXCLUDE=${NETOP_NETWORK_EXCLUDE:-""}   # whereabouts list of excluded IP addresses
export NETOP_PERNODE_BLOCKSIZE=${NETOP_PERNODE_BLOCKSIZE:-"32"} # define the number of IP addrs that can be allocated per worker node
                                                    # in your cluster from the nvipam pool
export NETOP_VENDOR="15b3"                          # NVidia vendor id
export NETOP_SULIST=( "su-1" )                      # SU (scalable unit) list, different IPPools for diffent pod sets

export PROD_VER=${PROD_VER:-"1"}                    # is this a production version
if [ "${PROD_VER}" = "1" ];then
  export NETOP_IMAGE_SECRET=${NETOP_IMAGE_SECRET:-""}
  export NETOP_VERSION=${NETOP_VERSION:-"26.1.0"}   # select network operator version
# export NETOP_HELM_URL="https://helm.ngc.nvidia.com/nvidia/cloud-native/charts/network-operator-${NETOP_VERSION}.tgz"
  export HELM_NVIDIA_REPO="https://helm.ngc.nvidia.com/nvidia"     # helm repo URL
  export NETOP_HELM_URL="https://helm.ngc.nvidia.com/nvidia/charts/network-operator-${NETOP_VERSION}.tgz"  # helm chart tarball
else
  #export NETOP_VERSION="25.10.0-beta.4"               #  set in global_ops_user.cfg select network operator version
  export HELM_NVIDIA_REPO="https://helm.ngc.nvidia.com/nvstaging"  # helm repo URL
  export NETOP_HELM_URL="https://helm.ngc.nvidia.com/nvstaging/mellanox/charts/network-operator-${NETOP_VERSION}.tgz" # helm chart tarball
  # set in set in global_ops_user.cfg
  if [ -f /root/.ngc/config ];then
    DEFAULT_NGC_API_KEY=$(cat /root/.ngc/config|grep apikey|cut -d' ' -f3) # dev NGC_API_KEY
  else
    DEFAULT_NGC_API_KEY=""
  fi
  export NGC_API_KEY=${NGC_API_KEY:-${DEFAULT_NGC_API_KEY}}   # dev KEY set in global_ops_user.cfg
  export NGC_SECRET=${NGC_SECRET:-"ngc-image-secret"}         # dev image secret
fi

export CALICO_ROOT=${CALICO_ROOT:-"3.28.2"}
#export CALICO_ROOT=${CALICO_ROOT:-"3.30.3"}
export CALICO_VERSION="v${CALICO_ROOT}"

export CNI_PLUGINS_VERSION=${CNI_PLUGINS_VERSION:-"v1.5.1"}

# Container runtime versions
export CRI_DOCKERD_VERSION=${CRI_DOCKERD_VERSION:-"0.3.15"}  # Version for K8s 1.24+ Docker support
export HELM_VERSION=${HELM_VERSION:-"3.15.4"}                # Helm package manager version

#
# select the use case to implement
#
# Replace with a different usecase scenario if necessary
# Usecase scenarios are named after a folder names under 'usecase' directory
export USECASE=${USECASE:-"sriovnet_rdma"}
#export USECASE=${USECASE:-"hostdev_rdma_sriov"}
#export USECASE=${USECASE:-"ipoib_rdma_shared_device"}
#export USECASE=${USECASE:-"macvlan_rdma_shared_device"}
#export USECASE=${USECASE:-"sriovibnet_rdma"}

# default number of VFs to define
case ${USECASE} in
hostdev_rdma_sriov|sriovibnet_rdma|sriovnet_rdma|sriovnet_dra)
  export NUM_VFS=${NUM_VFS:-"8"}
  ;;
ipoib_rdma_shared_device|macvlan_rdma_shared_device)
  export NUM_VFS=${NUM_VFS:-"0"}
  ;;
esac
if [ ! -v DEVICE_TYPES ];then
DEVICE_TYPES=( "connectx-6" )
fi
#
# select the ipam mode.
# nv-ipam: preferred scaleable > 1000's
# whereabouts small clusters < 60 nodes
#

# https://github.com/Mellanox/nvidia-k8s-ipam
export IPAM_TYPE=${IPAM_TYPE:-"nv-ipam"}
#export NVIPAM_POOL_TYPE="CIDRPool"
export NVIPAM_POOL_TYPE=${NVIPAM_POOL_TYPE:-"IPPool"}
#export IPAM_TYPE="whereabouts"
#export IPAM_TYPE="dhcp"
# CIDRPool defs
export NETOP_GATEWAY_INDEX=${NETOP_GATEWAY_INDEX:-"1"}
export NETOP_PER_NODE_PREFIX=${NETOP_PER_NODE_PREFIX:-"24"}
#
# set to false when running host mofed, not container version
#
OFED_ENABLE=${OFED_ENABLE:-"true"}
#
# set true to fix OFED_BLACKLIST bug
#
export OFED_BLACKLIST_ENABLE=${OFED_BLACKLIST_ENABLE:-"false"}
export OFED_BLACKLIST_ADD=${OFED_BLACKLIST_ADD:-""}
export OFED_BLACKLIST_MODULES_FILE=${OFED_BLACKLIST_MODULES_FILE:-"/host/etc/modprobe.d/blacklist-ofed-modules.conf"}
#
# disable when GPU-operator is running NFD
#
export NFD_ENABLE=${NFD_ENABLE:-"true"}
#
# set true when only want the config yaml files created
#
export CREATE_CONFIG_ONLY=${CREATE_CONFIG_ONLY:-"1"}

if [ "${CREATE_CONFIG_ONLY}" = "1" ];then
  docmd="echo Install command: "
else
  docmd=""
fi
#
# for RDMA AI E/W traffic, 9000 is usally the selected MTU number
#
export NETOP_MTU=${NETOP_MTU:-"1500"}
# Use shared or exclusive mode for rdma namespace.
# When set to false, only allocated RDMA devices will be visible on the pod
# When set to true, all RDMA devices will be visible on the pod
export RDMASHAREDMODE=${RDMASHAREDMODE:-"true"}
#
# use when setting Source Based Routing
# loads the SBR plugin for the network definition
#
export SBRMODE=${SBRMODE:-"false"}
#
# default for NIC_CONFIG_OPERATOR
#
export NIC_CONFIG_ENABLE=${NIC_CONFIG_ENABLE:-"false"}
#
# default for MAINTENANCE_OPERATOR
#
case ${NETOP_VERSION} in
  25.10.*|26.*)
    # Default coupled to NIC_CONFIG_ENABLE (historically, the nic-configuration
    # operator's daemon needs the maintenance operator's NodeMaintenance CRDs),
    # but allow an explicit override from user config / env.
    export MAINTENANCE_OPERATOR_ENABLE=${MAINTENANCE_OPERATOR_ENABLE:-${NIC_CONFIG_ENABLE}}
    ;;
  *)
    export MAINTENANCE_OPERATOR_ENABLE=${MAINTENANCE_OPERATOR_ENABLE:-"true"}
    ;;
esac
#
# default for NIC Feature Discovery
#
export NIC_FD_ENABLE=${NIC_FD_ENABLE:-"false"}
#
# default for NFSRDMA
#
export ENABLE_NFSRDMA=${ENABLE_NFSRDMA:-"false"}
#
# node selector default for node-role.kubernetes.io
#
export NETOP_NODESELECTOR=${NETOP_NODESELECTOR:-"node-role.kubernetes.io/worker"}
export NETOP_NODESELECTOR_VAL=${NETOP_NODESELECTOR_VAL:-""}
#
# network definition files
#
export NETOP_BCM_CONFIG=${NETOP_BCM_CONFIG:-"false"}
export NETOP_COMBINED=${NETOP_COMBINED:-"false"}
export NETOP_TAG_VERSION=${NETOP_TAG_VERSION:-"false"}
if [ "${NETOP_BCM_CONFIG}" == true ];then
  export NETOP_COMBINED=${NETOP_COMBINED:-"true"}
  case ${USECASE} in
  sriovnet_rdma)
    export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"combined-sriovnet.yaml"}
    ;;
  sriovnet_dra)
    export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"combined-sriovnet-dra.yaml"}
    ;;
  sriovibnet_rdma)
    export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"combined-sriovibnet.yaml"}
    ;;
  hostdev_rdma_sriov)
    export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"combined-hostdevsriov.yaml"}
    ;;
  ipoib_rdma_shared_device)
    export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"combined-ipoibshared.yaml"}
    ;;
  macvlan_rdma_shared_device)
    export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"combined-macvlanshared.yaml"}
    ;;
  esac
  export NETOP_IPPOOL_FILE=${NETOP_IPPOOL_FILE:-"combined-ippools.yaml"}
  export NETOP_NODEPOLICY_FILE=${NETOP_NODEPOLICY_FILE:-"combined-node-policy.yaml"}
  export NETOP_VALUES_FILE=${NETOP_VALUES_FILE:-"netop-values.yaml"}
else
  export NETOP_NETWORK_FILE=${NETOP_NETWORK_FILE:-"network.yaml"}
  export NETOP_IPPOOL_FILE=${NETOP_IPPOOL_FILE:-"ippool.yaml"}
  export NETOP_NODEPOLICY_FILE=${NETOP_NODEPOLICY_FILE:-"node-policy.yaml"}
  export NETOP_VALUES_FILE=${NETOP_VALUES_FILE:-"values.yaml"}
fi
export NETOP_NICCLUSTER_FILE=${NETOP_NICCLUSTER_FILE:-"NicClusterPolicy.yaml"}
#
# sriov node pool maxUnavailable
#
export NETOP_SRIOV_NODE_POOL=${NETOP_SRIOV_NODE_POOL:-"1"}
export NETOP_SRIOV_NODE_POOL_FILE=${NETOP_SRIOV_NODE_POOL_FILE:-"sriov-node-pool-config.yaml"}
#
# feature gates
#
export FG_PARALLEL_NIC_CONFIG=${FG_PARALLEL_NIC_CONFIG:-"true"}
export FG_RESOURCE_INJECTOR_MATCH=${FG_RESOURCE_INJECTOR_MATCH:-"false"}
export METRICS_EXPORTER=${METRICS_EXPORTER:-"false"}
export MANAGE_SW_BRIDGE=${MANAGE_SW_BRIDGE:-"false"}
export FG_MLNX_FW_RESET=${FG_MLNX_FW_RESET:-"false"}
#
# enable NicClusterPolicy nodeAffinity
#
export NCP_NODE_AFFINITY=${NCP_NODE_AFFINITY:-"false"}
#
# enable NicClusterPolicy DocaTelemtryService
#
export DOCA_TELEMETRY_SERVICE=${DOCA_TELEMETRY_SERVICE:-"false"}
#
# enable entry point debug
#
export ENTRYPOINT_DEBUG=${ENTRYPOINT_DEBUG:-"false"}
export DEBUG_LOG_FILE=${DEBUG_LOG_FILE:="/tmp/entrypoint_debug_cmds.log"}
export DEBUG_SLEEP_SEC_ON_EXIT=${DEBUG_SLEEP_SEC_ON_EXIT:=300}
source ${NETOP_ROOT_DIR}/usecase/${USECASE}/netop.cfg

#WARNING: This feature is not supported in 25.1.0
#If enabled, take care about NFS storage for FW upgrade
#https://docs.nvidia.com/networking/display/kubernetes2570/nic-conf-operator/nic-fw-configuration.html
FW_UPGRADE_ENABLE=${FW_UPGRADE_ENABLE:-"false"}
#
# unload third-party RDMA kernel modules via OFED init container (26.4.0+)
#
export UNLOAD_THIRD_PARTY_RDMA=${UNLOAD_THIRD_PARTY_RDMA:-"false"}
#
# enable NicNodePolicy — per-node-group OFED/device-plugin policy (26.4.0+)
#
export NIC_NODE_POLICY_ENABLE=${NIC_NODE_POLICY_ENABLE:-"false"}
export NIC_NODE_POLICY_FILE=${NIC_NODE_POLICY_FILE:-"nic-node-policy.yaml"}
#
# node pool list for multi-pool NicNodePolicy (26.4.0+)
# list the NETOP_NETLIST variable names to use as pools, e.g.:
#   NETOP_NODEPOOLS=( "NETOP_NETLIST" )              # single pool, current NETOP_NETLIST
#   NETOP_NODEPOOLS=( "NETOP_NETLIST_H200" "NETOP_NETLIST_GB300" )   # multi-pool
# each named pool requires NETOP_NODESELECTOR_<ID> and optionally NETOP_NODESELECTOR_VAL_<ID>
#
if [ ! -v NETOP_NODEPOOLS ]; then
  NETOP_NODEPOOLS=()
fi
#
# Fabric groups: pools that share L2 switch fabric also share IPPools.
# Assign each pool a fabric label via NETOP_FABRIC_<POOL_ID>.
# Pools with the same label share one set of IPPools; pools with no label share a
# single unsuffixed set. Per-fabric CIDR overrides use NETOP_NETWORK_RANGE_<FABRIC>.
# Example (two separate fabrics):
#   NETOP_FABRIC_H200="east"
#   NETOP_FABRIC_GB300="west"
#   NETOP_NETWORK_RANGE_east="192.168.0.0/16"
#   NETOP_NETWORK_RANGE_west="192.172.0.0/16"
# Example (all pools share one fabric — hyphens in name are fine):
#   NETOP_FABRIC_H200="gpu-fabric"
#   NETOP_FABRIC_GB300="gpu-fabric"
#
#
# emit global: block in NicClusterPolicy to share repo/version across all components (26.4.0+)
# NCP_GLOBAL_REPO/NCP_GLOBAL_VER override the auto-detected values from the containers file.
#
export NCP_GLOBAL_CONFIG=${NCP_GLOBAL_CONFIG:-"false"}
export NCP_GLOBAL_REPO=${NCP_GLOBAL_REPO:-""}
export NCP_GLOBAL_VER=${NCP_GLOBAL_VER:-""}
#
# Spectrum-X Operator (26.4.0+)
#
export SPECTRUM_X_ENABLE=${SPECTRUM_X_ENABLE:-"false"}
# Reference architecture version: RA1.3, RA2.0, RA2.1, RA3.0 (empty = not configured)
export SPECTRUM_X_RA_VERSION=${SPECTRUM_X_RA_VERSION:-""}
#
# DRA SR-IOV driver (26.4.0+). Mutually exclusive with SR-IOV device plugin.
# Set DRA_ENABLE=true and SRIOV_DEVICE_PLUGIN_ENABLE=false to use DRA mode.
#
export DRA_ENABLE=${DRA_ENABLE:-"false"}
export DRA_CDI_ROOT=${DRA_CDI_ROOT:-"/var/run/cdi"}
export DRA_IFACE_PREFIX=${DRA_IFACE_PREFIX:-"net"}
#
# ibKubernetes (ib-kubernetes daemon for InfiniBand PKey/GUID management)
#
export IB_KUBERNETES_ENABLE=${IB_KUBERNETES_ENABLE:-"false"}
# GUID pool range for ib-kubernetes pKeyGUIDPoolRangeStart/End fields (8-byte GUID format)
export IB_GUID_RANGE_START=${IB_GUID_RANGE_START:-${IB_PKEY_RANGE_START:-"02:00:00:00:00:00:00:00"}}
export IB_GUID_RANGE_END=${IB_GUID_RANGE_END:-${IB_PKEY_RANGE_END:-"02:FF:FF:FF:FF:FF:FF:FF"}}
export IB_UFM_SECRET=${IB_UFM_SECRET:-"ufm-secret"}
#
# Per-pool override (26.4.0+): NETOP_ACTIVE_POOL is exported by the mk-config.sh pool
# loop so subscripts pick up the correct per-pool NETLIST, nodeSelector, and network name.
# Applied last so it wins over usecase/netop.cfg defaults.
#
if [ -n "${NETOP_ACTIVE_POOL:-}" ]; then
  eval "NETOP_NETLIST=( \"\${NETOP_NETLIST_${NETOP_ACTIVE_POOL}[@]}\" )"
  eval "export NETOP_NODESELECTOR=\${NETOP_NODESELECTOR_${NETOP_ACTIVE_POOL}:-\${NETOP_NODESELECTOR}}"
  eval "export NETOP_NODESELECTOR_VAL=\${NETOP_NODESELECTOR_VAL_${NETOP_ACTIVE_POOL}:-\${NETOP_NODESELECTOR_VAL}}"
  export NETOP_NETWORK_NAME="${NETOP_NETWORK_NAME}-${NETOP_ACTIVE_POOL,,}"
  # Resolve fabric group: NETOP_FABRIC_<POOL_ID> label → NETOP_ACTIVE_FABRIC.
  # Hyphens in fabric names are valid for K8s object names but not bash variable names,
  # so variable lookup converts hyphens to underscores automatically.
  eval "export NETOP_ACTIVE_FABRIC=\${NETOP_FABRIC_${NETOP_ACTIVE_POOL}:-}"
  if [ -n "${NETOP_ACTIVE_FABRIC}" ]; then
    _FABRIC_VAR="${NETOP_ACTIVE_FABRIC//-/_}"
    eval "export NETOP_NETWORK_RANGE=\${NETOP_NETWORK_RANGE_${_FABRIC_VAR}:-\${NETOP_NETWORK_RANGE}}"
    eval "export NETOP_NETWORK_GW=\${NETOP_NETWORK_GW_${_FABRIC_VAR}:-\${NETOP_NETWORK_GW}}"
  fi
else
  export NETOP_ACTIVE_FABRIC=""
fi
