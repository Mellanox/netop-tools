---
apiVersion: nv-ipam.nvidia.com/v1alpha1
kind: CIDRPool
metadata:
  name: sriovnet-pool-b
  namespace: nvidia-network-operator
spec:
  cidr: 192.171.0.0/16
  gatewayIndex: 1
  perNodeNetworkPrefix: 27
  routes:
  - dst: 192.171.0.0/16
  nodeSelector:
    nodeSelectorTerms:
    - matchExpressions:
      - key: node-role.kubernetes.io/worker
        operator: Exists
#       - key: node.su/
#         operator: Exists
