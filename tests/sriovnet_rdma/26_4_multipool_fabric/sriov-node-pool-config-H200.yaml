apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetworkPoolConfig
metadata:
  name: h200-node-pool-unavailable-config
  namespace: nvidia-network-operator
spec:
  maxUnavailable: 1
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/worker
        operator: In
        values:
          - h200
