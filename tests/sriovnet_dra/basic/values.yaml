---
nfd:
  enabled: true
  deployNodeFeatureRules: true
node-feature-discovery:
  imagePullSecrets:
    - name: ngc-image-secret
maintenanceOperator:
  enabled: false
nvIpam:
  deploy: true
sriovNetworkOperator:
  enabled: true
sriov-network-operator:
  sriovOperatorConfig:
    configDaemonNodeSelector:
      node-role.kubernetes.io/worker: ""
    featureGates:
      parallelNicConfig: true
      mellanoxFirmwareReset: false
      resourceInjectorMatchCondition: false
      metricsExporter: false
      manageSoftwareBridges: false
  images:
    sriovDraDriver: nvcr.io/nvstaging/mellanox/dra-driver-sriov:network-operator-v26.4.0-beta.7
draDriver:
  cdiRoot: "/var/run/cdi"
  defaultInterfacePrefix: "net"
  imagePullSecrets: [ngc-image-secret]   # <- specify your created pull secrets for ngc private repo

# NicClusterPolicy CR values:
imagePullSecrets: [ngc-image-secret]   # <- specify your created pull secrets for ngc private repo
