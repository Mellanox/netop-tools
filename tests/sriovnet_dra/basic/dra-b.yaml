---
apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: sriovnet-dra-b-claim
  namespace: nvidia-network-operator
spec:
  spec:
    devices:
      requests:
        - name: vf
          exactly:
            deviceClassName: sriovnetwork.k8snetworkplumbingwg.io
            count: 1
            selectors:
              - cel:
                  expression: >
                    device.attributes["k8s.cni.cncf.io"].resourceName == "nvidia.com/sriov_resource_b"
